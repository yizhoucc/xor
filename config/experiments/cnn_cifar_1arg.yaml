---
exp_name: cnn_cifar_1arg
exp_dir: ./exp
use_gpu: true
gpus: [0]
seed: 1234
dataset:
  name: cifar10
  loader_name: InnerNetData
  data_path: ./data
  split: train
model:
  name: XorNeuronConv
  num_cell_types: 1
  inner_net: conv
  input_channel: 3
  arg_in_dim: 1
  in_channel: 64
  out_channel: [60, 120, 120, 120]
  kernel_size: [3, 3, 3, 1]
  zero_pad: [0, 0, 0, 0]
  stride: [1, 1, 1, 1]
  dropout: 0.5
  num_classes: 10
  loss: CrossEntropy
pretrain:
  optimizer: Adam
  num_workers: 0
  max_epoch: 500
  batch_size: 100
  snapshot_epoch: 1000
  lr: 1.0e-3
  wd: 0.0e-4
  momentum: 0.9
  shuffle: true
  best_model: [/model_snapshot_best_pretrained0.pth]
train:
  optimizer: Adam
  lr_decay: 0.1
  lr_decay_steps: [10000]
  num_workers: 0
  max_epoch: 200
  batch_size: 100
  display_iter: 5000
  snapshot_epoch: 1000
  valid_epoch: 1
  lr: 1.0e-3
  wd: 0.0e-4
  momentum: 0.9
  shuffle: true
  is_resume: false
  resume_model: None
  best_model: /model_snapshot_best_phase1.pth
test:
  batch_size: 100
  num_workers: 0
  test_model: /model_snapshot_best_phase2.pth
