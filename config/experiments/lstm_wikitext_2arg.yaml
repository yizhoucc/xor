# LSTM + WikiText-2 with InnerNet activation
exp_name: lstm_wikitext_2arg
task_type: language_model
seed: 1234
use_gpu: true
exp_dir: exp

model:
  name: InnerNetLSTMModel
  inner_hidden: 32

lm:
  context_size: 32
  embed_dim: 64
  hidden_dim: 128
  batch_size: 128
  epochs: 10
  lr: 0.001
  grad_clip: 1.0
  num_seeds: 5
  num_workers: 4
