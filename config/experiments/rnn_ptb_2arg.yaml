---
# RNN + PTB + 2-arg learned activation
exp_name: rnn_ptb_2arg
exp_dir: ./exp
use_gpu: true
gpus: [0]
seed: 1234
dataset:
  name: ptb
  loader_name: InnerNetData
  data_path: ./data
  split: train
model:
  name: ComplexNeuronRNN
  num_cell_types: 10
  inner_net: mlp
  embedding_dim: 120
  arg_in_dim: 2
  in_hidden_dim: 64
  out_hidden_dim: [120]
  dropout: 0.5
  loss: CrossEntropy
pretrain:
  optimizer: Adam
  num_workers: 0
  max_epoch: 500
  batch_size: 100
  snapshot_epoch: 1000
  lr: 1.0e-3
  wd: 0.0e-4
  momentum: 0.9
  shuffle: true
  best_model: [/model_snapshot_best_pretrained0.pth,
               /model_snapshot_best_pretrained1.pth,
               /model_snapshot_best_pretrained2.pth,
               /model_snapshot_best_pretrained3.pth,
               /model_snapshot_best_pretrained4.pth,
               /model_snapshot_best_pretrained5.pth,
               /model_snapshot_best_pretrained6.pth,
               /model_snapshot_best_pretrained7.pth,
               /model_snapshot_best_pretrained8.pth,
               /model_snapshot_best_pretrained9.pth]
train:
  optimizer: Adam
  lr_decay: 0.1
  lr_decay_steps: [10000]
  num_workers: 0
  max_epoch: 30
  batch_size: 20
  display_iter: 5000
  snapshot_epoch: 1000
  valid_epoch: 1
  lr: 1.0e-3
  wd: 0.0e-4
  momentum: 0.9
  bptt: 35
  clip: 0.25
  shuffle: true
  is_resume: false
  resume_model: None
  early_stop_window: 20
  best_model: /model_snapshot_best_phase1.pth
train_phase2:
  max_epoch: 30
test:
  batch_size: 20
  num_workers: 0
  test_model: /model_snapshot_best_phase2.pth
