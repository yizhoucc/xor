---
# CNN + CIFAR-10 + ReLU baseline (parameter-matched to 2-arg XorNeuronConv)
exp_name: cnn_cifar_relu
exp_dir: ./exp
use_gpu: true
gpus: [0]
seed: 1234
dataset:
  name: cifar10
  loader_name: InnerNetData
  data_path: ./data
  split: train
model:
  name: BaselineCNN
  input_channel: 3
  out_channel: [46, 92, 92, 92]
  kernel_size: [3, 3, 3, 1]
  zero_pad: [0, 0, 0, 0]
  stride: [1, 1, 1, 1]
  dropout: 0.5
  num_classes: 10
  loss: CrossEntropy
pretrain:
  optimizer: Adam
  num_workers: 0
  max_epoch: 500
  batch_size: 100
  snapshot_epoch: 1000
  lr: 1.0e-3
  wd: 0.0e-4
  momentum: 0.9
  shuffle: true
  best_model: []
train:
  optimizer: Adam
  lr_decay: 0.1
  lr_decay_steps: [10000]
  num_workers: 0
  max_epoch: 400
  batch_size: 100
  display_iter: 5000
  snapshot_epoch: 1000
  valid_epoch: 1
  lr: 1.0e-3
  wd: 0.0e-4
  momentum: 0.9
  shuffle: true
  is_resume: false
  resume_model: None
  early_stop_window: 20
  best_model: /model_snapshot_best_phase1.pth
test:
  batch_size: 100
  num_workers: 0
  test_model: /model_snapshot_best_phase1.pth
