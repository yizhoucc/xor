---
exp_name: xor_neuron_mlp_cifar_simple
exp_dir: /home/yc/repo/xor_neuron_yoon/exp/xor_neuron_mlp_cifar
runner: XorNeuronRunner_v2
use_gpu: true
gpus: [0]
seed: 123
dataset:
  name: cifar10
  loader_name: InnerNetData
  data_path: /home/yc/repo/xor_neuron_yoon/data
  split: train
model:
  name: XorNeuronMLP_v3
  num_cell_types: 2 # artbitrary choice
  arg_in_dim: 2 
  num_classes: 10 # decide by dataset and task
  inner_net: mlp
  input_dim: 3072 #784(mnist)/3072(cifar10)
  in_hidden_dim: 64
  out_hidden_dim: [120,120,120] # [132, 132, 132]
  dropout: 0.5
  loss: CrossEntropy
pretrain:
  optimizer: Adam
  num_workers: 0
  max_epoch: 55
  batch_size: 100
  snapshot_epoch: 100
  lr: 1.0e-3
  wd: 0.0e-4
  momentum: 0.9
  shuffle: true
  best_model: [ /model_snapshot_best_pretrained1.pth,
                /model_snapshot_best_pretrained0.pth ]
train:
  optimizer: Adam
  lr_decay: 0.1
  lr_decay_steps: [10000]
  num_workers: 8
  max_epoch: 200
  batch_size: 1024
  display_iter: 500
  snapshot_epoch: 1000
  valid_epoch: 1
  lr: 1.0e-3
  wd: 0.0e-4
  momentum: 0.9
  shuffle: true
  is_resume: false
  resume_model: None
  best_model: /model_snapshot_best_phase1.pth
test:
  batch_size: 100
  num_workers: 0
  test_model: /model_snapshot_best_phase2.pth
